# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Rust, Soroban SDK 25, Cargo workspace with contracts/
  Architecture: Modular token contract — contract.rs (entry), core/ (business logic via TokenManager), events/ (event publishing), storage/ (DataKey types, errors). Uses OpenZeppelin stellar-contracts (v0.6.0) for FungibleToken, Ownable, Pausable, Upgradeable, Burnable.
  Testing: cargo test via Soroban testutils (#[test] functions using Env::default, mock_all_auths, Address::generate). One test file at contracts/tokens/src/tests.rs with basic flow test.
  Style: Cargo workspace, wasm32v1-none target, Stellar CLI for deploys, Makefile for build/test/deploy shortcuts.
  Convention: SEP-0041 fungible token with owner-gated minting, pausability, upgradeability. Single package (my-token) in contracts/tokens/.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Reference which Stellar SEP is affected
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Include Soroban auth requirements (require_auth, mock_all_auths)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Reference OpenZeppelin stellar-contracts trait usage
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (contract.rs → core/ → events/ → storage/)
    tdd: true
    test_command: "cargo test -p my-token"
  verify:
    test_command: "cargo test --workspace"
    build_command: "cargo build --workspace"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    command: cargo test
    framework: Rust built-in + soroban-sdk testutils
  layers:
    unit:
      available: true
      tool: "cargo test -p my-token"
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: true
      command: "cargo clippy --all-targets -- -D warnings"
    type_checker:
      available: true
      command: "cargo check"
    formatter:
      available: true
      command: "cargo fmt --all"
